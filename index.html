<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OOP Scientific Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:20px;
}

.calculator{
    width:450px;
    padding:25px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

h2{
    text-align:center;
    color:white;
    margin-bottom:15px;
    letter-spacing:1px;
}

#display{
    width:100%;
    height:85px;
    border:none;
    outline:none;
    border-radius:18px;
    padding:15px;
    text-align:right;
    font-size:2rem;
    color:white;
    background:rgba(255,255,255,0.12);
    margin-bottom:15px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:17px;
    color:white;
    background:rgba(255,255,255,0.12);
    transition:0.25s;
}

button:hover{
    transform:translateY(-4px);
    background:rgba(255,255,255,0.22);
    box-shadow:0 10px 20px rgba(0,0,0,0.25);
}

button:active{
    transform:scale(.95);
}

.equal{
    background:#22c55e;
}

.equal:hover{
    background:#16a34a;
}

#history{
    margin-top:18px;
    height:140px;
    overflow-y:auto;
    border-radius:15px;
    padding:12px;
    color:white;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
}

#history b{
    display:block;
    margin-bottom:8px;
}

#history::-webkit-scrollbar{
    width:6px;
}

#history::-webkit-scrollbar-thumb{
    background:#64748b;
    border-radius:10px;
}

@media(max-width:500px){

    .calculator{
        width:100%;
    }

    button{
        height:55px;
        font-size:15px;
    }

    #display{
        font-size:1.6rem;
    }
}

</style>
</head>

<body>

<div class="calculator">

<h2>Scientific Calculator Ultra</h2>

<input type="text" id="display" readonly>

<div class="buttons">

<button onclick="calc.clear()">AC</button>
<button onclick="calc.backspace()">⌫</button>
<button onclick="calc.add('(')">(</button>
<button onclick="calc.add(')')">)</button>
<button onclick="calc.add('/')">÷</button>

<button onclick="calc.add('7')">7</button>
<button onclick="calc.add('8')">8</button>
<button onclick="calc.add('9')">9</button>
<button onclick="calc.add('*')">×</button>
<button onclick="calc.sqrt()">√</button>

<button onclick="calc.add('4')">4</button>
<button onclick="calc.add('5')">5</button>
<button onclick="calc.add('6')">6</button>
<button onclick="calc.add('-')">−</button>
<button onclick="calc.square()">x²</button>

<button onclick="calc.add('1')">1</button>
<button onclick="calc.add('2')">2</button>
<button onclick="calc.add('3')">3</button>
<button onclick="calc.add('+')">+</button>
<button onclick="calc.cube()">x³</button>

<button onclick="calc.add('0')">0</button>
<button onclick="calc.add('.')">.</button>
<button class="equal" onclick="calc.calculate()">=</button>
<button onclick="calc.pi()">π</button>
<button onclick="calc.add('**')">xʸ</button>

<button onclick="calc.sin()">sin</button>
<button onclick="calc.cos()">cos</button>
<button onclick="calc.tan()">tan</button>
<button onclick="calc.log()">log</button>
<button onclick="calc.ln()">ln</button>

</div>

<div id="history">
<b>History</b><br>
</div>

</div>

<script>

/* Parent Class */

class BasicCalculator{

    constructor(displayId){
        this.display = document.getElementById(displayId);
    }

    add(value){
        this.display.value += value;
    }

    clear(){
        this.display.value = "";
    }

    backspace(){
        this.display.value =
        this.display.value.slice(0,-1);
    }

    calculate(){
        try{
            this.display.value =
            Function("return " + this.display.value)();
        }
        catch{
            this.display.value = "Error";
        }
    }
}

/* Child Class */

class ScientificCalculator extends BasicCalculator{

    constructor(displayId,historyId){

        super(displayId);

        this.history =
        document.getElementById(historyId);
    }

    saveHistory(exp,result){

        this.history.innerHTML +=
        `${exp} = ${result}<br>`;
    }

    /* Polymorphism (Method Overriding) */

    calculate(){

        try{

            let exp = this.display.value;

            let result =
            Function("return " + exp)();

            this.display.value = result;

            this.saveHistory(exp,result);

        }
        catch{

            this.display.value = "Error";
        }
    }

    sqrt(){
    this.display.value = Number(
        Math.sqrt(Number(this.display.value)).toFixed(6)
    );
}

square(){
    this.display.value = Number(
        (Number(this.display.value) ** 2).toFixed(6)
    );
}

cube(){
    this.display.value = Number(
        (Number(this.display.value) ** 3).toFixed(6)
    );
}

sin(){
    let num = Number(this.display.value);
    this.display.value = Number(
        Math.sin(num * Math.PI / 180).toFixed(6)
    );
}

cos(){
    let num = Number(this.display.value);
    this.display.value = Number(
        Math.cos(num * Math.PI / 180).toFixed(6)
    );
}

tan(){
    let num = Number(this.display.value);
    this.display.value = Number(
        Math.tan(num * Math.PI / 180).toFixed(6)
    );
}

log(){
    let num = Number(this.display.value);
    this.display.value = Number(
        Math.log10(num).toFixed(6)
    );
}

ln(){
    let num = Number(this.display.value);
    this.display.value = Number(
        Math.log(num).toFixed(6)
    );
}

pi(){
    this.display.value = Number(
        Math.PI.toFixed(6)
    );
}
/* Object */

const calc =
new ScientificCalculator(
"display",
"history"
);

/* Keyboard Support */

document.addEventListener("keydown",(e)=>{

    if(/[0-9+\-*/().]/.test(e.key)){
        calc.add(e.key);
    }

    else if(e.key === "Enter"){
        calc.calculate();
    }

    else if(e.key === "Backspace"){
        calc.backspace();
    }

    else if(e.key === "Escape"){
        calc.clear();
    }

});

</script>

</body>
</html>
